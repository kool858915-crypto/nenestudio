services:
  - type: web
    name: nene-studio-api
    env: node
    # 本番: 永続ディスクでユーザー/課金データを保持（Starter 以上が必要）
    plan: starter
    disk:
      name: nene-data
      mountPath: /var/data
      sizeGB: 1
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8787
      - key: APP_BASE_URL
        sync: false
      - key: PUBLIC_APP_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: COOKIE_DOMAIN
        value: .nenestudio.net
      - key: JWT_SECRET
        generateValue: true
      - key: REQUIRE_PERSISTENT_DB
        value: "true"
      - key: DATABASE_PATH
        value: /var/data/nene-studio-db.json
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
      - key: STRIPE_PRICE_ID_ADFREE
        sync: false
      - key: STRIPE_PRICE_ID_AI50
        sync: false
      - key: STRIPE_PRICE_ID_AI100
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: APPLE_CLIENT_ID
        sync: false
