services:
  - type: web
    name: nene-studio-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8787
      - key: APP_BASE_URL
        sync: false
      - key: PUBLIC_APP_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_PATH
        value: ./server/nene-studio-db.json
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
      - key: STRIPE_PRICE_ID_ADFREE
        sync: false
      - key: STRIPE_PRICE_ID_AI50
        sync: false
      - key: STRIPE_PRICE_ID_AI100
        sync: false
      - key: OPENAI_API_KEY
        sync: false
